[workspace]
resolver = "3"
members = [
  "crates/retrocast-core",
  "crates/retrocast-cli",
  "crates/retrocast-python",
]

# This is the release workspace used by Rust users, Maturin, and CI so every
# front end builds the same core from one lockfile.
[workspace.package]
version = "0.8.1"
edition = "2024"
rust-version = "1.85"
license = "MIT"
repository = "https://github.com/ischemist/project-procrustes"
homepage = "https://retrocast.ischemist.com/"
documentation = "https://retrocast.ischemist.com/"

[workspace.dependencies]
anyhow = "1.0.100"
clap = { version = "4.5.54", features = ["derive"] }
chrono = { version = "0.4.44", default-features = false, features = ["clock", "serde"] }
csv = "1.4.0"
cxx = "1.0.189"
cxx-build = "1.0.189"
flate2 = { version = "1.1.5", default-features = false, features = ["zlib-rs"] }
num-bigint = "0.4.6"
percent-encoding = "2.3.2"
proptest = "1.11.0"
pyo3 = { version = "0.29.0", features = ["abi3-py311"] }
rand = "0.9.2"
rand_chacha = "0.9.0"
rayon = "1.11.0"
regex = "1.12.3"
reqwest = { version = "0.12.28", default-features = false, features = ["blocking", "rustls-tls"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = { version = "1.0.149", features = ["preserve_order"] }
serde_yaml = "0.9.34"
sha2 = "0.10.9"
thiserror = "2.0.17"
tempfile = "3.27.0"
url = "2.5.7"

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
