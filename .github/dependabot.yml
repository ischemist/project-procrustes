version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "type/security"

  - package-ecosystem: "uv"
    directory: "/scripts/planning/run-synplanner"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "type/security"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
    labels:
      - "type/security"
