version: 2

updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "scope/ci-cd"

  - package-ecosystem: "uv"
    directory: "/scripts/planning/run-synplanner"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels:
      - "scope/ci-cd"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "scope/ci-cd"
