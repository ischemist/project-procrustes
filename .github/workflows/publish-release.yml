name: Publish standalone CLI bundles

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cli:
    name: ${{ matrix.platform }} CLI
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            os: ubuntu-24.04
          - platform: macos-arm64
            os: macos-14
          - platform: macos-x86_64
            os: macos-15-intel
          - platform: windows-x86_64
            os: windows-2022
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}
          fetch-depth: 0

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: cli-build
          create-args: >-
            rdkit=2026.03.4
            boost-cpp
            ${{ runner.os == 'Linux' && 'patchelf pax-utils' || '' }}
          cache-environment: true

      - uses: dtolnay/rust-toolchain@stable

      - name: Build standalone executable
        shell: bash -el {0}
        if: runner.os != 'Windows'
        run: |
          export RDKIT_ROOT="$CONDA_PREFIX"
          export BOOST_ROOT="$CONDA_PREFIX"
          cargo build --locked --release --manifest-path retrocast-rs/Cargo.toml -p retrocast-cli

      - name: Build standalone executable (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:RDKIT_ROOT = $env:CONDA_PREFIX
          $env:BOOST_ROOT = $env:CONDA_PREFIX
          cargo build --locked --release --manifest-path retrocast-rs/Cargo.toml -p retrocast-cli

      - name: Install macOS relocation tooling
        if: runner.os == 'macOS'
        shell: bash -el {0}
        run: python -m pip install 'delocate>=0.13.0'

      - name: Assemble relocatable Unix bundle
        if: runner.os != 'Windows'
        shell: bash -el {0}
        env:
          PLATFORM: ${{ matrix.platform }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          bundle="dist/retrocast-${RELEASE_TAG}-${PLATFORM}"
          mkdir -p "$bundle/lib"
          cp retrocast-rs/target/release/retrocast "$bundle/retrocast"
          cp LICENSE README.md "$bundle/"

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            delocate-path -L "$bundle/lib" "$bundle"
          else
            while IFS= read -r dependency; do
              [[ "$dependency" == "$CONDA_PREFIX"/* ]] || continue
              soname="$(patchelf --print-soname "$dependency")"
              [[ -n "$soname" ]] || soname="$(basename "$dependency")"
              cp -L "$dependency" "$bundle/lib/$soname"
            done < <(lddtree -l "$bundle/retrocast" | sort -u)
            patchelf --set-rpath '$ORIGIN/lib' "$bundle/retrocast"
            find "$bundle/lib" -type f -exec patchelf --set-rpath '$ORIGIN' {} \;
          fi

          env -i PATH=/usr/bin:/bin "$bundle/retrocast" --version
          env -i PATH=/usr/bin:/bin "$bundle/retrocast" list-adapters | grep aizynthfinder >/dev/null
          env -i PATH=/usr/bin:/bin "$bundle/retrocast" adapt \
            --input tests/testing_data/aizynth-smoke.json \
            --adapter aizynthfinder \
            --output "$bundle/smoke.json" \
            --max-candidates 1
          test -s "$bundle/smoke.json"
          rm "$bundle/smoke.json" "$bundle/smoke.manifest.json"
          tar -C dist -czf "$bundle.tar.gz" "$(basename "$bundle")"

      - name: Assemble relocatable Windows bundle
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PLATFORM: ${{ matrix.platform }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          $ErrorActionPreference = 'Stop'
          $bundleName = "retrocast-$env:RELEASE_TAG-$env:PLATFORM"
          $bundle = Join-Path dist $bundleName
          New-Item -ItemType Directory -Force -Path $bundle | Out-Null
          Copy-Item retrocast-rs\target\release\retrocast.exe $bundle
          Copy-Item LICENSE, README.md $bundle
          Copy-Item "$env:CONDA_PREFIX\Library\bin\*.dll" $bundle
          & "$bundle\retrocast.exe" --version
          if (-not (& "$bundle\retrocast.exe" list-adapters | Select-String aizynthfinder)) {
            throw 'standalone adapter registry smoke failed'
          }
          & "$bundle\retrocast.exe" adapt `
            --input tests\testing_data\aizynth-smoke.json `
            --adapter aizynthfinder `
            --output "$bundle\smoke.json" `
            --max-candidates 1
          if (-not (Test-Path "$bundle\smoke.json" -PathType Leaf)) {
            throw 'standalone adapt smoke output was not created'
          }
          Remove-Item "$bundle\smoke.json", "$bundle\smoke.manifest.json"
          Compress-Archive -Path $bundle -DestinationPath "$bundle.zip"

      - uses: actions/upload-artifact@v6
        with:
          name: retrocast-cli-${{ matrix.platform }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  publish:
    if: github.event_name == 'release'
    needs: cli
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: retrocast-cli-*
          path: dist
          merge-multiple: true
      - name: Write checksums
        working-directory: dist
        run: sha256sum retrocast-* > SHA256SUMS
      - name: Upload CLI bundles to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/retrocast-*
            dist/SHA256SUMS
