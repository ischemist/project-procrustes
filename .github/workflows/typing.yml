name: Linting & Type Checking

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  type-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install RDKit C++ build dependencies
        run: sudo apt-get update && sudo apt-get install -y librdkit-dev libboost-dev

      - name: Configure RDKit C++ build
        run: |
          echo "RDKIT_ROOT=/usr" >> "$GITHUB_ENV"
          echo "RDKIT_INCLUDE_DIR=/usr/include/rdkit" >> "$GITHUB_ENV"
          echo "RDKIT_LIB_DIR=/usr/lib/x86_64-linux-gnu" >> "$GITHUB_ENV"
          echo "BOOST_ROOT=/usr" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # this is the same caching logic from your tests workflow. big speed up.
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --extra viz

      - name: Check Rust formatting
        run: cargo fmt --manifest-path retrocast-rs/Cargo.toml --all -- --check

      - name: Lint Rust workspace
        run: cargo clippy --manifest-path retrocast-rs/Cargo.toml --workspace --all-targets --locked -- -D warnings

      - name: Run ruff (linter)
        run: uv run ruff check

      - name: Run ruff (formatter)
        run: uv run ruff format --check

      - name: Run ty
        run: uv run ty check .
