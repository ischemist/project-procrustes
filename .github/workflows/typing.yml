name: Linting & Type Checking

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  type-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: native-build
          create-args: >-
            librdkit-dev=2026.03.4
            libboost-headers=1.90
          cache-environment: true

      - name: Configure RDKit C++ build
        shell: bash -el {0}
        run: |
          echo "RDKIT_ROOT=$CONDA_PREFIX" >> "$GITHUB_ENV"
          echo "BOOST_ROOT=$CONDA_PREFIX" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$CONDA_PREFIX/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # this is the same caching logic from your tests workflow. big speed up.
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock', 'packages/retrocast-rs/Cargo.lock', 'packages/retrocast-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --extra viz

      - name: Run ruff (linter)
        run: uv run ruff check

      - name: Run ruff (formatter)
        run: uv run ruff format --check

      - name: Run ty
        run: uv run ty check .
