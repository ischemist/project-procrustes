name: RetroCast (Python Bindings) Lint

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  lint:
    name: RetroCast (Python Bindings) Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      # this is the same caching logic from your tests workflow. big speed up.
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock', 'packages/retrocast-rs/Cargo.lock', 'packages/retrocast-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Run ruff (linter)
        run: uv run --no-sync ruff check packages/retrocast-rs/python-tests scripts/smoke-native-wheel.py

      - name: Run ruff (formatter)
        run: uv run --no-sync ruff format --check packages/retrocast-rs/python-tests scripts/smoke-native-wheel.py
