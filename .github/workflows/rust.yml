name: Rust

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: rust-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  test:
    name: Test native engine
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # v3
        with:
          environment-name: native-build
          create-args: >-
            librdkit-dev=2026.03.4
            libboost-headers=1.90
          cache-environment: true

      - name: Configure RDKit C++ build
        shell: bash -el {0}
        run: |
          echo "RDKIT_ROOT=$CONDA_PREFIX" >> "$GITHUB_ENV"
          echo "BOOST_ROOT=$CONDA_PREFIX" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$CONDA_PREFIX/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo build
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/retrocast-rs/target
          key: ${{ runner.os }}-rust-${{ hashFiles('packages/retrocast-rs/Cargo.lock', 'packages/retrocast-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - name: Check formatting
        run: cargo fmt --manifest-path packages/retrocast-rs/Cargo.toml --all -- --check

      - name: Lint workspace
        run: cargo clippy --manifest-path packages/retrocast-rs/Cargo.toml --workspace --all-targets --locked -- -D warnings

      - name: Run workspace tests
        run: cargo test --manifest-path packages/retrocast-rs/Cargo.toml --workspace --all-targets --locked

      - name: Run Rust properties at CI depth
        env:
          PROPTEST_CASES: "512"
        run: cargo test --manifest-path packages/retrocast-rs/Cargo.toml -p retrocast-core --locked
