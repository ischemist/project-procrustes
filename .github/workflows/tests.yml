name: RetroCast (Python Bindings) Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  test:
    name: RetroCast (Python Bindings) Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: native-build
          create-args: >-
            librdkit-dev=2026.03.4
            libboost-headers=1.90
          cache-environment: true

      - name: Configure RDKit C++ build
        shell: bash -el {0}
        run: |
          echo "RDKIT_ROOT=$CONDA_PREFIX" >> "$GITHUB_ENV"
          echo "BOOST_ROOT=$CONDA_PREFIX" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$CONDA_PREFIX/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/uv
            ~/.uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml', 'uv.lock', 'packages/retrocast-rs/Cargo.lock', 'packages/retrocast-rs/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Create and activate virtual environment
        run: |
          uv venv --clear
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Build and install native extension
        run: uv sync

      - name: Run tests
        run: uv run pytest -v
