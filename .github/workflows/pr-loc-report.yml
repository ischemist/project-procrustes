name: pr loc report

on:
  pull_request:
    branches:
      - main
      - master
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  loc-report:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: fetch base branch
        run: git fetch origin "${{ github.base_ref }}"

      - name: generate loc report
        run: |
          python3 scripts/pr-size-report.py \
            --base "origin/${{ github.base_ref }}" \
            --head "${{ github.sha }}" \
            --measure git \
            > pr-loc-report.md

      - name: publish loc report summary
        run: cat pr-loc-report.md >> "$GITHUB_STEP_SUMMARY"

      - name: post loc report
        uses: actions/github-script@v9
        with:
          retries: 3
          script: |
            const fs = require("fs");
            const marker = "<!-- retrocast-pr-loc-report -->";
            const body = fs.readFileSync("pr-loc-report.md", "utf8");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const preserveSummaryOnServerError = (error) => {
              if (!error.status || error.status < 500) throw error;
              core.warning(`GitHub comment API returned ${error.status}; the report remains available in the job summary.`);
              return null;
            };

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            }).catch(preserveSummaryOnServerError);
            if (!comments) return;

            const existing = comments.find((comment) => comment.body && comment.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              }).catch(preserveSummaryOnServerError);
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              }).catch(preserveSummaryOnServerError);
            }
